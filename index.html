<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>เรียนจีนใกล้ฉัน ฟรี chatgpt</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">


<script src="js/data_vocab.js"></script>
<script src="js/data_dialog.js"></script>
<script src="js/datasets.js"></script>
<script src="js/app.js"></script>

</head>

<body>

<select id="mode">
<option value="ct">CN→TH</option>
<option value="tc">TH→CN</option>
</select>

<select id="nextMode" onchange="changeNextMode()">
    <option value="seq">Seq</option>
    <option value="random">Shuffle</option>
</select>

<select id="studyMode" onchange="changeStudyMode()">
    <option value="vocab">Vocab</option>
    <option value="dialog">Dialog</option>
</select>

<select id="category" onchange="changeCategory()">		
	</select>
	
<select id="lesson" onchange="loadWords()">    
	</select>

<div class="button-bar">
	<button id="answerModeBtn" onclick="toggleAnswerMode()">
		<i id="answerModeIcon"
		   class="fa-regular fa-closed-captioning"></i>
	</button>

	<button id="speakerBtn" onclick="toggleSpeaker()">
		<i id="speakerIcon" class="fa-solid fa-volume-xmark"></i>
	</button>
</div>
<i class="fa-regular fa-closed-captioning"></i>

<div class="card-wrapper">

	<button class="nav-btn left" onclick="previous()">
		<i class="fa-solid fa-chevron-left"></i>
	</button>
	
	<div id="card" class="card"></div>

	<button class="nav-btn right" onclick="next()">
		<i class="fa-solid fa-chevron-right"></i>
	</button>

</div>

<div class="button-bar">
	<div class="info" id="info"></div>
</div>


<div class="button-bar">
	<button class= "autoBtn" id="autoBtn" onclick="toggleAuto()">
		<i id="autoIcon" class="fa-solid fa-play"></i>
	</button>
</div>

<div class="button-bar">
    <button class="show-table-btn" id="show-table-btn" onclick="showTable()"> 
		<i class="fa-regular fa-folder-closed"></i>
	</button>
</div>

<div class="table-wrapper">
	<table id="wordTable">    
		<tbody>
		</tbody>
	</table>
</div>

<script>

init();

</script>
</body>
</html>
